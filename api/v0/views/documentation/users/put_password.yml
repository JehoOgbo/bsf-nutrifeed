Updates a user's password
---
tags:
  - Users
security:
  - Bearer: []
parameters:
  - name: user_id
    in: path
    type: string
    required: true
    description: The unique UUID of the user changing their password
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - old_password
        - new_password
      properties:
        old_password:
          type: string
          format: password
          example: "oldSecurePass123"
        new_password:
          type: string
          format: password
          example: "newUltraSecure456"
description: >
  "Securely updates a user's password. The system verifies the current 
  password before hashing and saving the new one."
responses:
  200:
    description: Password updated successfully
    schema:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
  400:
    description: Not a JSON or invalid request body
  401:
    description: Incorrect current password or missing JWT token
  404:
    description: User not found
  409:
    description: Database conflict or save failure
