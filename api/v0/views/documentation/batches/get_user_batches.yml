Retrieves all batches for a specific user ID
---
tags:
  - Batch Production
security:
  - Bearer: []
parameters:
  - name: user_id
    in: path
    type: string
    required: true
    description: The UUID of the user whose batches you want to retrieve
responses:
  200:
    description: A list of batch objects belonging to the user
    schema:
      type: array
      items:
        properties:
          id: {type: string}
          name: {type: string}
          user_id: {type: string}
  404:
    description: User not found
